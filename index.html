<!DOCTYPE html>
<html>
<head>
    <title>Antrean Pasien</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background: #f4f4f9; }
        .card { background: white; margin: auto; padding: 20px; border-radius: 15px; width: 80%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #nomor { font-size: 80px; color: #2ecc71; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nomor Antrean Saat Ini</h1>
        <div id="nomor">Memuat...</div>
        <p>Silakan pantau terus nomor Anda.</p>
    </div>

    <script>
        async function fetchAntrean() {
            // Mengambil file data.json dari GitHub Raw (tambahkan timestamp agar tidak kena cache)
            const response = await fetch('data.json?t=' + new Date().getTime());
            const data = await response.json();
            document.getElementById('nomor').innerText = data.nomor_sekarang;
        }
        setInterval(fetchAntrean, 5000); // Update setiap 5 detik
        fetchAntrean();
    </script>
</body>
</html>
