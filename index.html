<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Panel Petugas - Panggil Antrean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDF5E6; }
        .btn-panggil { background-color: #1A1A1A; color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 5px; width: 80%; }
    </style>
</head>
<body class="p-8">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Control Panel Petugas</h2>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
        
        <div class="bg-[#B194C1] p-6 rounded-[30px] flex flex-col items-center text-white shadow-lg">
            <span class="text-xs font-semibold">Antrian Saat Ini</span>
            <h1 id="val-umum" class="text-4xl font-black my-2">AB-0</h1>
            <button onclick="panggil('umum')" class="btn-panggil">Panggil Berikutnya</button>
            <button onclick="ulang('umum')" class="btn-panggil">Panggil Ulang</button>
            <span class="font-bold mt-2">Poli Umum</span>
        </div>

        <div class="bg-[#D4A017] p-6 rounded-[30px] flex flex-col items-center text-white shadow-lg">
            <span class="text-xs font-semibold">Antrian Saat Ini</span>
            <h1 id="val-kia" class="text-4xl font-black my-2">DA-0</h1>
            <button onclick="panggil('kia')" class="btn-panggil">Panggil Berikutnya</button>
            <button onclick="ulang('kia')" class="btn-panggil">Panggil Ulang</button>
            <span class="font-bold mt-2">Poli KIA</span>
        </div>

        </div>

    <script>
        // Logika sederhana untuk simulasi panggil
        function panggil(poli) {
            let el = document.getElementById('val-' + poli);
            let current = parseInt(el.innerText.split('-'));
            let prefix = el.innerText.split('-');
            el.innerText = prefix + "-" + (current + 1);
            alert("Memanggil antrean " + el.innerText + " ke " + poli);
        }
        
        function ulang(poli) {
            let num = document.getElementById('val-' + poli).innerText;
            alert("Memanggil ULANG antrean " + num);
        }
    </script>
</body>
</html>
